<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      max-height: 520px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #09090b;
      color: #fafafa;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #27272a;
      text-align: center;
      position: relative;
    }
    .settings-btn {
      position: absolute;
      top: 16px;
      right: 12px;
      width: 32px;
      height: 32px;
      padding: 0;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: #a1a1aa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .settings-btn:hover { color: #fafafa; background: #27272a; }
    .back-btn {
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 12px;
      background: transparent;
      border: 1px solid #27272a;
      border-radius: 6px;
      color: #a1a1aa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
    }
    .back-btn:hover { color: #fafafa; background: #27272a; }
    .view { display: none; }
    .view.active { display: block; }
    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 8px;
    }
    .logo svg { width: 22px; height: 22px; stroke: white; }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
    .tagline { font-size: 12px; color: #71717a; }
    .content { padding: 12px; }
    .btn {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary { background: #fafafa; color: #09090b; }
    .btn-primary:hover { background: #ffffff; }
    .btn-secondary { background: #27272a; color: #fafafa; border: 1px solid #3f3f46; }
    .btn-secondary:hover { background: #3f3f46; }
    .btn-success { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.4); }
    .btn-success:hover { background: rgba(34, 197, 94, 0.3); }
    .divider { height: 1px; background: #27272a; margin: 12px 0; }
    .config { margin-bottom: 12px; }
    label { display: block; font-size: 11px; font-weight: 500; color: #a1a1aa; margin-bottom: 4px; }
    input, select {
      width: 100%;
      padding: 8px 10px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      font-size: 12px;
      color: #fafafa;
      font-family: 'SF Mono', 'Monaco', monospace;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #3f3f46;
    }
    .status {
      text-align: center;
      font-size: 11px;
      color: #71717a;
      padding: 8px;
      background: #18181b;
      border-radius: 6px;
      border: 1px solid #27272a;
      margin-top: 8px;
    }
    .status.active { color: #22c55e; background: rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.3); }
    .status.error { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
    .section-title { font-size: 11px; font-weight: 600; color: #a1a1aa; margin-bottom: 6px; text-transform: uppercase; }
    .config-hint { font-size: 10px; color: #71717a; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <button class="settings-btn" id="settingsBtn" title="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18M9 21V9"/>
      </svg>
    </div>
    <h1>Notionbook</h1>
    <p class="tagline">Research + Notion + AI</p>
  </div>

  <div id="mainView" class="view active">
  <div class="content">
    <button class="btn btn-success" id="connectNotion" style="display: none;">
      <span>✓</span> Connected to Notion
    </button>
    <button class="btn btn-secondary" id="connectNotionBtn">
      <span>🔗</span> Connect to Notion
    </button>

    <div class="divider"></div>
    <div class="section-title">Notion Actions</div>
    <button class="btn btn-primary" id="saveTabs">
      <span>📑</span> Save Tabs to Notion
    </button>
    <button class="btn btn-secondary" id="searchNotion">
      <span>🔍</span> Search Notion
    </button>
    <button class="btn btn-secondary" id="captureToNotion">
      <span>📷</span> Capture Page to Notion
    </button>
    <button class="btn btn-secondary" id="researchSummary">
      <span>📋</span> Research Summary
    </button>

    <div class="divider"></div>
    <div class="section-title">Prototyping</div>
    <button class="btn btn-primary" id="toggleToolbar">
      <span>🎨</span> Open Toolbar
    </button>
    <button class="btn btn-secondary" id="loadMockups">
      <span>📂</span> Load Saved Mockups
    </button>

    <div class="status" id="status">Ready</div>
  </div>
  </div>

  <div id="settingsView" class="view">
  <div class="content">
    <button class="back-btn" id="backBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back
    </button>
    <h2 style="font-size: 14px; font-weight: 600; margin-bottom: 12px; text-align: center;">Settings</h2>

    <div class="section-title">API Keys (BYOK)</div>
    <p class="config-hint">Keys stay in your browser. Never sent to our servers.</p>
    <div class="config">
      <label>Claude (Anthropic)</label>
      <input type="password" id="apiKeyClaude" placeholder="sk-ant-...">
    </div>
    <div class="config">
      <label>Gemini (Google)</label>
      <input type="password" id="apiKeyGemini" placeholder="AIza...">
    </div>
    <div class="config">
      <label>Groq</label>
      <input type="password" id="apiKeyGroq" placeholder="gsk_...">
    </div>
    <button class="btn btn-secondary" id="saveApiKeys">Save API Keys</button>

    <div class="divider"></div>
    <div class="config">
      <label>AI Model</label>
      <select id="aiModel">
        <option value="claude">Claude</option>
        <option value="gemini">Gemini</option>
        <option value="groq">Groq</option>
      </select>
    </div>
    <div class="config">
      <label>Backend API URL</label>
      <input type="text" id="apiUrl" placeholder="http://localhost:3001">
    </div>
    <div class="status" id="statusSettings">Ready</div>
  </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
